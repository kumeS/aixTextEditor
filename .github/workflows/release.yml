# ──────────────────────────────────────────────────────────────
# GitHub Actions: Build & Release — aixTextEditor (Tauri v2)
#
# Trigger:  Push a tag matching  v*  (e.g. v1.0.0)
# Result:   Builds a macOS aarch64 .dmg and publishes a GitHub Release.
# ──────────────────────────────────────────────────────────────
name: Build & Release

on:
  push:
    tags:
      - 'v*'

# Allow creating releases and uploading assets
permissions:
  contents: write

env:
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: 'stable'

jobs:
  # ── Build macOS (Apple Silicon) ────────────────────────────
  build-macos:
    runs-on: macos-latest          # Apple Silicon (M-series) runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target aarch64-apple-darwin

      - name: List build artifacts
        run: |
          echo "=== Bundle directory ==="
          ls -lhR src-tauri/target/aarch64-apple-darwin/release/bundle/ || true

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Create GitHub Release ──────────────────────────────────
  create-release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List downloaded assets
        run: |
          echo "=== Release assets ==="
          find release-assets -type f | sort

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.0.0
          VER="${TAG#v}"                     # strip leading 'v'
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk -v ver="$VER" '
            /^## / {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          # If no matching section, use a generic message
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          # Write multi-line output using delimiter
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/**/*.dmg
